<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon premier site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f9f9f9;
      margin: 0;
      padding: 50px;
    }
    h1 {
      color: #2c3e50;
    }
    p {
      color: #555;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <h1>Bienvenue sur mon site 🎉</h1>
  <p>Ceci est mon premier site hébergé avec GitHub Pages, entièrement en français.</p>
  <a href="https://github.com" class="btn">Voir mon GitHub</a>
</body>
  </html>
